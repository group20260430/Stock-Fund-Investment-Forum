  /api/admin/categories/{id}:
    put:
      tags:
        - 管理运营系统
      summary: 编辑板块
      operationId: adminUpdateCategory
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
